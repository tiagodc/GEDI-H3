name: Release

# Publishing is deliberately separate from Build (which only ever validates).
# A PyPI version is immutable — it cannot be re-uploaded and deleting it does
# not free the number — so the only way to publish is an explicit, deliberate
# act: pushing a v* tag, or dispatching this workflow by hand.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      target:
        description: 'Index to publish to'
        type: choice
        options: [testpypi, pypi]
        default: testpypi

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build --sdist --wheel

      - name: Validate distribution
        run: twine check --strict dist/*

      - name: Refuse to publish if the tag disagrees with the package version
        # Guards the one mistake this workflow cannot undo: tagging v0.14.3
        # while pyproject still says 0.14.2 would burn the wrong version
        # number on PyPI permanently.
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$tag  pyproject=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match the packaged version $pkg. Not publishing."
            exit 1
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    # The environment gates the release behind whatever protection rules you
    # put on it in repo settings, and its name must match the one registered
    # with the Trusted Publisher on PyPI.
    environment: >-
      ${{ (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi')
          && 'testpypi' || 'pypi' }}
    permissions:
      # OIDC only. No API token is stored anywhere, so none can leak.
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: >-
            ${{ (github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi')
                && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
          print-hash: true
