name: Tests

on:
  push:
    branches: [main]
  pull_request:

# Least privilege, stated explicitly rather than inherited from the repo default.
permissions:
  contents: read

jobs:
  # With the GDAL Python bindings present: exercises the osgeo VRT backend and
  # the tests that assert the pure-Python writer matches it.
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install GDAL system dependencies
        # PyPI's GDAL is sdist-only and requires an exactly version-matched
        # libgdal, hence the gdal-config pin rather than a version range.
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgdal-dev gdal-bin
          pip install GDAL==$(gdal-config --version)

      - name: Install test dependencies
        run: pip install -e ".[test]"

      - name: Run unit tests
        run: |
          pytest tests/ \
            -m "not integration and not slow" \
            --tb=short -q \
            --cov=gedih3 \
            --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # No system libraries, no GDAL bindings — the environment a plain
  # `pip install gedih3` produces. Guards the invariant that the package
  # installs and fully works from wheels alone.
  pip-only-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install from wheels only
        # --only-binary :all: fails the job if any dependency would need to be
        # compiled from source, which is what needing system libraries means.
        run: 'pip install --only-binary :all: -e ".[test]"'

      - name: Assert the GDAL bindings really are absent
        run: |
          if python -c "import osgeo" 2>/dev/null; then
            echo "::error::osgeo is installed; this job must run without it"
            exit 1
          fi

      - name: Run unit tests
        run: pytest tests/ -m "not integration and not slow" --tb=short -q

  # Every declared lower bound, pinned with ==. Floors that nobody installs
  # drift into fiction: before this job existed, three of them were literally
  # unsatisfiable and the suite failed on the rest.
  minimum-versions:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"   # the requires-python floor
          cache: pip

      - name: Install dependencies at their declared floors
        # Installed first and separately: resolving the pins together with the
        # project makes pip backtrack through unbounded transitives until it
        # gives up with resolution-too-deep.
        run: |
          pip install -r constraints-min.txt
          pip install --no-deps .
          pip install pytest pytest-cov

      - name: Assert the floors are what got installed
        run: |
          pip freeze | sort > /tmp/frozen.txt
          while read -r pin; do
            case "$pin" in ''|'#'*) continue ;; esac
            grep -qix "$pin" /tmp/frozen.txt || {
              echo "::error::$pin was not the installed version"
              exit 1
            }
          done < constraints-min.txt

      - name: Run unit tests
        run: pytest tests/ -m "not integration and not slow" --tb=short -q
