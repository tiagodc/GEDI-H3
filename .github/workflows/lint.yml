name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check code style
        uses: astral-sh/ruff-action@v3
        with:
          args: "check src/ tests/"

      - name: Check formatting
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check src/ tests/"
