# Reference Dask config for massive gedih3 builds (global / continental scale).
#
# This is a TEMPLATE — gh3_build does not auto-load it. Use one of:
#
#   # CLI: point the dask CLI at the file via the DASK_CONFIG env var
#   # (Dask reads this at import time; there is no --config-file flag.)
#   export DASK_CONFIG=<path-to-this-file>
#   dask scheduler ...
#   dask worker ...
#
#   # CLI: alternatively, drop a symlink under ~/.config/dask/ — auto-loaded
#   ln -s <path-to-this-file> ~/.config/dask/gedih3-massive-build.yaml
#
#   # Python: load before constructing the Client
#   import yaml, dask
#   from gedih3.config import get_package_data_path
#   dask.config.update(yaml.safe_load(open(get_package_data_path('dask-config-massive-build.yaml'))))
#
# Resolve the bundled file path:
#   python -c "from gedih3.config import get_package_data_path; \
#              print(get_package_data_path('dask-config-massive-build.yaml'))"
#
# See `docs/user-guide/building-a-database.md` → "Building Massive Databases"
# for the full runbook (scheduler + workers + verification + recovery).

distributed:

  # ── Worker-side memory thresholds ──────────────────────────────────────
  # Defaults are 0.60 / 0.70 / 0.80 / 0.95 (target / spill / pause / terminate).
  # Slightly looser here so steady-state work isn't constantly spilling on
  # a node that's actually sized correctly. The `nanny.pre-spawn-environ`
  # block below is what actually bounds RSS by returning freed pages to
  # the OS — these thresholds just keep transient task working-sets in
  # memory instead of thrashing to spill disk.
  worker:
    memory:
      target: 0.70
      spill: 0.80
      pause: 0.90
      terminate: 0.95
      # Re-classify "recent unmanaged" → "old unmanaged" after this much
      # idle time. Bump above your typical task wall-clock so the dashboard
      # doesn't constantly show false-positive recent-unmanaged spikes.
      # Keep this honest — `unmanaged old` is the canary that tells you
      # whether you're actually leaking memory.
      recent-to-old-time: "180s"

    # NO `lifetime` block on purpose.
    #
    # Earlier versions of this file enabled a 4h rolling restart with 20-30m
    # stagger as belt-and-suspenders against unmanaged-memory growth. In the
    # 2026-05-02 continental build that strategy caused a catastrophic
    # cascade: ~21k tasks marked for recompute and >40% of workers lost in
    # ~15 minutes. The mechanism — AMM key handoff during retirement
    # saturating survivor event loops, heartbeat timeouts, force-removal,
    # cascading recompute. With the pre-spawn-environ block below, RSS does
    # not actually grow over multi-day builds, so the rolling restart was
    # solving a problem that no longer exists. Watch `unmanaged old` on the
    # dashboard during your run; if it climbs past ~30% of memory_limit
    # over many hours, only THEN consider lifetime back, and use a stagger
    # >> typical-handoff-time (60-90m) to avoid the cascade.

  # ── Pre-spawn environment ──────────────────────────────────────────────
  # CRITICAL: these MUST be set BEFORE the worker process spawns. Dask's
  # `distributed.nanny.environ` block sets them AFTER spawn, by which time
  # libc has already initialized — the override silently no-ops. See
  # https://github.com/dask/distributed/issues/5279 for the gotcha.
  #
  # `MALLOC_TRIM_THRESHOLD_=0` makes glibc release freed pages to the OS
  # immediately (the Nanny's default of 65536 keeps too much around).
  # `ARROW_DEFAULT_MEMORY_POOL=system` forces PyArrow to allocate via
  # glibc instead of jemalloc; combined with MALLOC_TRIM, this means
  # parquet read/write buffers actually return to the OS after each task.
  # Together these are what eliminates the unmanaged-memory growth that
  # used to motivate a rolling restart.
  nanny:
    pre-spawn-environ:
      MALLOC_TRIM_THRESHOLD_: "0"
      ARROW_DEFAULT_MEMORY_POOL: "system"

  # ── Admin / quality of life ────────────────────────────────────────────
  admin:
    # Suppress the "Sending large graph..." UserWarning. The build's stage 1
    # legitimately produces graphs >100 MB.
    large-graph-warning-threshold: "500MB"
    # Suppress event-loop-tick warnings shorter than this. Parquet writer
    # flushes can briefly block the loop for ~10-30s, and the default 3s
    # threshold floods the log with false positives. Don't push this much
    # higher: multi-minute stalls are a genuine canary for GIL-saturation
    # under load (this is how we diagnosed the 2026-05-02 retirement
    # cascade — the 71s/60s "unresponsive" warnings were the signal).
    tick:
      limit: "120s"
