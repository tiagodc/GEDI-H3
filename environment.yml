channels:
  - conda-forge

variables:
  GH3_DEFAULT_DOWNLOAD_DIR: /gpfs/data1/vclgp/data/iss_gedi/h3_mock
  GH3_DEFAULT_TMP_DIR: /gpfs/data1/vclgp/data/iss_gedi/h3_mock/tmp
  GH3_DEFAULT_SOC_DIR: /gpfs/data1/vclgp/data/iss_gedi/soc
  GH3_DEFAULT_H3_DIR: /gpfs/data1/vclgp/data/iss_gedi/h3_mock/database_world_merged

dependencies:
  # Package managers
  - conda
  - mamba
  - pip

  # Core Python
  - python[version='>=3.13']
  - setuptools[version='>=80.0']

  # Core scientific computing
  - numpy[version='>=2.2']
  - pandas[version='>=2.3']
  - scipy[version='>=1.11']

  # Geospatial libraries
  - geopandas[version='>=1.1']
  - shapely[version='>=2.0']
  - fiona[version='>=1.10']
  - pyproj
  - rasterio
  - rioxarray[version='>=0.19']
  - antimeridian
  - geocube[version='>=0.7']

  # H3 geospatial indexing
  - h3[version='>=4.3']
  - h3pandas[version='>=0.3']

  # Parallel computing
  - dask[version='>=2025.5']
  - dask-geopandas[version='>=0.5']
  - distributed
  - numba
  - duckdb[version='>=1.4.1']

  # Data formats
  - pyarrow[version='>=20.0']
  - h5py[version='>=3.14']
  - xarray[version='>=2025.7']
  - netcdf4
  - pyyaml

  # NASA Earthdata access
  - earthaccess[version='>=0.14']

  # Utilities
  - python-dateutil[version='>=2.9']
  - python-dotenv
  - tenacity[version='>=8.2']
  - tqdm
  - pqdm
  - requests

  # GDAL/PROJ system libraries
  - gdal
  - proj
  - proj-data

  # Development and interactive tools
  - jupyterlab
  - ipython
  - ipykernel
  - notebook
  - matplotlib-base
  - bokeh
  - folium
  - ipywidgets
  - pytest

  # Install gedih3 in editable mode via pip
  - pip:
    - -e .
