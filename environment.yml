channels:
  - conda-forge

# variables:
#   GH3_DEFAULT_DOWNLOAD_DIR: 
#   GH3_DEFAULT_TMP_DIR: 
#   GH3_DEFAULT_SOC_DIR: 
#   GH3_DEFAULT_H3_DIR: 

dependencies:
  # Package managers
  - conda
  - mamba
  - pip

  # Core Python
  # Capped below 3.14: on Windows, some not-yet-reputable cp314 conda-forge
  # binaries can be blocked from loading by Smart App Control. cp313 builds
  # have reputation and load fine. Lift the cap once cp314 wheels are established.
  - python[version='>=3.13,<3.14']
  - setuptools[version='>=80.0']

  # Core scientific computing
  - numpy[version='>=2.2']
  - pandas[version='>=2.3']
  - scipy[version='>=1.11']

  # Geospatial libraries
  - geopandas[version='>=1.1']
  - shapely[version='>=2.0']
  - pyogrio[version='>=0.7.2']
  - pyproj
  - rasterio
  - rioxarray[version='>=0.19']
  - antimeridian
  - geocube[version='>=0.7']

  # H3 geospatial indexing
  - h3[version='>=4.3']
  - h3pandas[version='>=0.3']

  # Parallel computing
  - dask[version='>=2025.5']
  - dask-geopandas[version='>=0.5']
  - distributed
  - numba
  - duckdb[version='>=1.4.4,<1.5']  # 1.4.x LTS: DuckLake catalog format v0.3 (1.5+ writes v0.4, unreadable by 1.4)

  # Data formats
  - pyarrow[version='>=20.0']
  - h5py[version='>=3.14']
  - xarray[version='>=2025.7']
  - netcdf4
  - pyyaml

  # NASA Earthdata access
  - earthaccess[version='>=0.14']

  # Utilities
  - python-dateutil[version='>=2.9']
  - python-dotenv
  - tqdm
  - pqdm

  # GDAL/PROJ system libraries
  - libgdal
  - gdal
  - proj
  - proj-data

  # Development and interactive tools
  - jupyterlab
  - ipython
  - ipykernel
  - notebook
  - matplotlib-base
  - bokeh
  - folium
  - ipywidgets

  # Testing
  - pytest
  - pytest-cov

  # Documentation
  - sphinx[version='>=8.0']
  - pydata-sphinx-theme[version='>=0.16']
  - numpydoc[version='>=1.8']
  - myst-parser[version='>=4.0']
  - sphinx-autoapi[version='>=3.4']

  # Install gedih3 in editable mode via pip
  - pip:
    - .
